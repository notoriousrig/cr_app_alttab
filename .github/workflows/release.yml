name: release

# Triggered by pushing a version tag (e.g. v1.0.0), or run manually from the
# Actions tab / API with a version input. Builds the self-contained single-file
# exe on a Windows runner and publishes a GitHub Release with it attached,
# giving a permanent, login-free download URL. When run manually it also creates
# the tag (at the chosen ref) as part of publishing the release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write   # needed to create the release, tag, and upload assets

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained (single file, no runtime needed)
        run: >
          dotnet publish src/AltTabCustom/AltTabCustom.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -o publish-sc

      - name: Publish framework-dependent (slim, requires .NET 8 Desktop Runtime)
        run: >
          dotnet publish src/AltTabCustom/AltTabCustom.csproj
          -c Release -r win-x64 --self-contained false -p:SelfContained=false
          -p:PublishSingleFile=true -o publish-fd

      - name: Stage release assets with descriptive names
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item publish-sc/AltTabCustom.exe dist/AltTabCustom.exe
          Copy-Item publish-fd/AltTabCustom.exe dist/AltTabCustom-requires-dotnet8.exe

      - name: Create GitHub Release and upload exes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            dist/AltTabCustom.exe
            dist/AltTabCustom-requires-dotnet8.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
          name: AltTabCustom ${{ github.event.inputs.version || github.ref_name }}
          body: |
            **AltTabCustom** — a customizable, no-admin Alt+Tab window switcher for Windows 11.

            ### Download — pick one
            - **`AltTabCustom.exe`** (~70 MB) — *recommended.* Self-contained: just
              run it, **nothing to install, no admin needed**.
            - **`AltTabCustom-requires-dotnet8.exe`** (~3 MB) — slim build for people
              who already have (or can install) the **.NET 8 Desktop Runtime**.
              Smaller download, but it won't start without that runtime.

            Either runs as a normal user and minimizes to the system tray;
            right-click the tray icon → **Settings…**.

            > Windows SmartScreen may warn that the publisher is unknown (the exe is
            > unsigned). Click *More info → Run anyway*.

            ### Highlights
            - Replaces Alt+Tab via a low-level keyboard hook (no admin)
            - Type-to-filter search; Delete / middle-click to close a window
            - True most-recently-used ordering
            - Customizable item count, columns, fonts, sizes, colors, opacity
            - Optional start-with-Windows (per-user)
