name: release

# Triggered by pushing a version tag (e.g. v1.0.0), or run manually from the
# Actions tab / API with a version input. Builds the self-contained single-file
# exe on a Windows runner and publishes a GitHub Release with it attached,
# giving a permanent, login-free download URL. When run manually it also creates
# the tag (at the chosen ref) as part of publishing the release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write   # needed to create the release, tag, and upload assets

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish self-contained (single file, no runtime needed)
        run: >
          dotnet publish src/AltTabCustom/AltTabCustom.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -o publish-sc

      - name: Publish framework-dependent (slim, requires .NET 8 Desktop Runtime)
        # Compression in a single-file bundle is only allowed for self-contained
        # publishes, so disable it here (NETSDK1176).
        run: >
          dotnet publish src/AltTabCustom/AltTabCustom.csproj
          -c Release -r win-x64 --self-contained false -p:SelfContained=false
          -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=false -o publish-fd

      - name: Stage release assets with descriptive names
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item publish-sc/AltTabCustom.exe dist/AltTabCustom.exe
          Copy-Item publish-fd/AltTabCustom.exe dist/AltTabCustom-requires-dotnet8.exe

      - name: Create GitHub Release and upload exes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            dist/AltTabCustom.exe
            dist/AltTabCustom-requires-dotnet8.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: true
          name: AltTabCustom ${{ github.event.inputs.version || github.ref_name }}
          body: |
            **AltTabCustom** — a customizable, no-admin Alt+Tab window switcher for Windows 11.

            ### Download — pick one
            - **`AltTabCustom.exe`** (~70 MB) — *recommended.* Self-contained: just
              run it, **nothing to install, no admin needed**.
            - **`AltTabCustom-requires-dotnet8.exe`** (~0.3 MB) — slim build for people
              who already have (or can install) the **.NET 8 Desktop Runtime**.
              Smaller download, but it won't start without that runtime.

            Runs as a normal user and minimizes to the system tray; right-click the
            tray icon → **Settings…**.

            > Windows SmartScreen may warn that the publisher is unknown (the exe is
            > unsigned). Click *More info → Run anyway*.

            ### Features
            - **No admin required** — intercepts Alt+Tab via a low-level keyboard hook.
            - **Tap vs hold** — a quick Alt+Tab tap jumps to your last window with no
              UI; hold to open the switcher (configurable delay).
            - **Navigation** — <kbd>↑</kbd>/<kbd>↓</kbd> / <kbd>Tab</kbd>,
              <kbd>Home</kbd>/<kbd>End</kbd>, and <kbd>1</kbd>–<kbd>9</kbd> to jump to a row.
            - **Filter by app** — <kbd>→</kbd> narrows the list to just the selected
              window's application; <kbd>←</kbd> exits the app filter, or (when not
              filtered) closes the selected window.
            - **Type-to-filter search** with the matched text highlighted.
            - **Close from the switcher** — <kbd>Delete</kbd> or middle-click.
            - **True most-recently-used ordering.**
            - **Dock / undock display profiles** — separate visual settings for a
              large monitor vs a laptop screen, switched automatically by screen size.
            - **Custom icon rules** — force a chosen icon for windows whose title or
              process name matches (contains / equals / regex), optionally with a
              second condition ANDed in; edited in **Settings → Icon rules**.
            - **Deeply customizable** (per profile, with a live preview): item count,
              columns, item/icon sizes, font family + weight, colors, corner radius,
              opacity.
            - App icon, optional acrylic background (experimental), logging, and
              optional start-with-Windows (per-user).

            ### New in 1.7
            - **Press <kbd>.</kbd> while the switcher is visible to open Settings.**
            - **Fixed:** unchecking *Show process name* now actually hides the
              process-name line in the switcher (per display profile).

            ### Fixes in 1.6.1
            - **Icon rules** now scroll: the tab scrolls and the rules list has its
              own scrollbar, so you can reach every rule (and the full editor) no
              matter how many you add.

            ### New in 1.6
            - **Icon rules can require a second condition (AND)** — e.g. *title
              contains “calendar” **and** process contains “outlook”*. Each side
              independently picks the field, match type, and pattern. Existing
              rules are unaffected.

            ### Fixes in 1.5.1
            - The first Alt+Tab after a monitor/resolution change (e.g. docking or
              undocking) is now centered correctly instead of appearing in the wrong
              spot and only correcting on the next draw.

            ### New in 1.5
            - **Refreshed Settings** — cleaner, card-based layout with a modern light
              theme (the switcher overlay is unchanged).
            - **Single-click the tray icon** to open Settings (right-click still
              shows the menu).
            - <kbd>←</kbd> now closes the selected window when you're not filtered to
              an app (and still exits the app filter when you are).

            ### New in 1.4
            - **Filter by app** — press <kbd>→</kbd> to narrow the switcher to just
              the selected window's application (windows sharing its process);
              <kbd>←</kbd> goes back to the full list. Combines with type-to-filter.

            ### New in 1.3
            - **Custom icon rules** — override the icon for matching windows
              (by title or process; contains / equals / regex), via a new
              **Settings → Icon rules** tab.

            ### Reliability (since 1.2)
            - Window icons load **asynchronously**, off the keyboard-hook hot path,
              so the first Alt+Tab is instant.
            - A **watchdog** re-installs the keyboard hook if Windows ever drops it.
            - Unit tests (MRU ordering, profile resolution, settings migration, and
              icon-rule matching) run in CI.
